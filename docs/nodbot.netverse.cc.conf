# 备份当前配置
sudo cp /etc/nginx/conf.d/nodbot.netverse.cc.conf /etc/nginx/conf.d/nodbot.netverse.cc.conf.bak

# 写入新配置
sudo tee /etc/nginx/conf.d/nodbot.netverse.cc.conf << 'EOF'
# ============================================
# HTTP 重定向到 HTTPS
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name nodbot.netverse.cc;

    # Let's Encrypt 验证
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 强制跳转 HTTPS
    return 301 https://$host$request_uri;
}

# ============================================
# HTTPS 主服务
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nodbot.netverse.cc;

    # ---------- 全局优化 ----------
    client_header_timeout 180s;
    client_body_timeout 180s;
    client_max_body_size 1024M;
    keepalive_timeout 300;

    gzip on;
    gzip_buffers 32 4K;
    gzip_comp_level 6;
    gzip_min_length 100;
    gzip_types application/javascript text/css text/xml image/jpeg image/gif image/png application/json;
    gzip_disable "MSIE [1-6]\.";
    gzip_vary on;

    # ---------- SSL 配置（Let's Encrypt） ----------
    ssl_certificate /etc/letsencrypt/live/nodbot.netverse.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nodbot.netverse.cc/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;


    # ============================================
    # 2. OTA 接口（关键修复，推荐 8003 端口）
    # 对外：https://nodbot.netverse.cc/ota/v1/
    # ============================================
    location /ota/ {
        rewrite ^/ota/(.*)$ /xiaozhi/ota/$1 break;
        proxy_pass http://127.0.0.1:8002;  
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /otaMag/ {
        rewrite ^/otaMag/(.*)$ /xiaozhi/otaMag/$1 break;
        proxy_pass http://127.0.0.1:8002;  
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # 2. API 接口（关键修复）
    # 对外：https://nodbot.netverse.cc/server/
    # ============================================

    location /server/ {
        rewrite ^/server/(.*)$ /xiaozhi/$1 break;
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    

    # ============================================
    # 6. WebSocket 主服务（聊天 /api/chat/v1/）
    # ============================================
    location /api/chat/v1/ {
        rewrite ^/api/chat/v1/(.*)$ /xiaozhi/v1/$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_cookie_path /xiaozhi/ /;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Referer $http_referer;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 3600;   # 长连接超时
        proxy_send_timeout 3600;
    }


    # ============================================
    # 3. MCP 服务
    # ============================================
    location /mcp/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_cookie_path /mcp/ /;
        proxy_set_header Referer $http_referer;
        proxy_set_header Cookie $http_cookie;
        proxy_connect_timeout 10;
        proxy_send_timeout 10;
        proxy_read_timeout 10;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ============================================
    # 4. MCP Endpoint（带 WebSocket）
    # ============================================
    location /mcp_endpoint/ {
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_cookie_path /mcp_endpoint/ /;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Referer $http_referer;
        proxy_set_header Cookie $http_cookie;
    }

    # ============================================
    # 5. 声纹识别（Voiceprint）
    # ============================================
    location /voiceprint/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
        proxy_cookie_path /voiceprint/ /;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Referer $http_referer;
        proxy_set_header Cookie $http_cookie;
    }

    # ============================================
    # 1. 控制台（Admin / Manager-Web） - SPA 处理（关键修复）
    # 对外：https://nodbot.netverse.cc/admin/v1/
    # ============================================
    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

}
EOF

# 测试并重载
echo "=== 测试 Nginx 配置 ==="
sudo nginx -t

if [ $? -eq 0 ]; then
    echo "=== 配置语法正确，正在重载 Nginx ==="
    sudo systemctl reload nginx
    echo "=== 完成！请测试控制台和 OTA ==="
else
    echo "=== 配置有误，请检查错误信息 ==="
fi